services:
  # ─── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Database Migrations ────────────────────────────────────
  migrate:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    command: >
      sh -c "cd /app/apps/api && npx prisma migrate deploy && npx tsx prisma/seed.ts"
    environment:
      # Override host to Docker service name — .env uses localhost for local dev
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      SESSION_SECRET: ${SESSION_SECRET}
      HA_BASE_URL: ${HA_BASE_URL}
      HA_TOKEN: ${HA_TOKEN}
      ASSET_STORAGE_PATH: ${ASSET_STORAGE_PATH:-/uploads}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@localhost}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme123}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ─── API Backend ────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      # Override host to Docker service name — .env uses localhost for local dev
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      API_PORT: ${API_PORT:-3001}
      SESSION_SECRET: ${SESSION_SECRET}
      HA_BASE_URL: ${HA_BASE_URL}
      HA_TOKEN: ${HA_TOKEN}
      ASSET_STORAGE_PATH: ${ASSET_STORAGE_PATH:-/uploads}
      BACKUP_STORAGE_PATH: /backups
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
    volumes:
      - uploads:/uploads
      - ${BACKUP_STORAGE_PATH}:/backups
    ports:
      - "${API_PORT:-3001}:${API_PORT:-3001}"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:${API_PORT:-3001}/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Web Frontend ────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    restart: unless-stopped
    ports:
      - "${APP_PORT:-5173}:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  uploads:
