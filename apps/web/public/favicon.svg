<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="5" fill="#141424"/>
  <!-- Outer walls -->
  <rect x="4" y="5" width="23" height="21" fill="none" stroke="#cbd5e1" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Interior vertical wall (top section) -->
  <line x1="16" y1="5" x2="16" y2="18" stroke="#cbd5e1" stroke-width="1.5"/>
  <!-- Interior horizontal wall (right side) -->
  <line x1="16" y1="18" x2="27" y2="18" stroke="#cbd5e1" stroke-width="1.5"/>
  <!-- Door opening in left room bottom wall -->
  <line x1="8" y1="26" x2="14" y2="26" stroke="#141424" stroke-width="2"/>
  <!-- Door arc -->
  <path d="M8 26 a6 6 0 0 1 6 -6" fill="none" stroke="#3b82f6" stroke-width="1.2"/>
  <!-- Hotspot in top-right room -->
  <circle cx="22" cy="11" r="2.5" fill="#3b82f6"/>
  <!-- Hotspot in bottom-right room -->
  <circle cx="22" cy="22" r="1.5" fill="#3b82f6"/>
</svg>